<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CleanDrive Sweden</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
}

header {
  background: #0056b3;
  color: white;
  padding: 40px;
}

.section {
  background: white;
  margin: 20px;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 80%;
  padding: 10px;
  margin: 10px;
}

button {
  padding: 10px 20px;
  background: #007BFF;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

/* WhatsApp */
.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px;
  border-radius: 50px;
  text-decoration: none;
}

/* Call button */
.call {
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: #007BFF;
  color: white;
  padding: 15px;
  border-radius: 50px;
  text-decoration: none;
}
</style>

</head>

<body>

<header>
  <h1>🚗 CleanDrive Sweden</h1>
  <p>Professionell mobil biltvätt</p>
</header>

<div class="section">
  <h2>📅 Boka nu</h2>

  <form id="bookingForm">
    <input type="text" id="name" placeholder="Ditt namn" required><br>
    <input type="datetime-local" id="time" required><br>
    <button type="submit">Boka nu</button>
  </form>
</div>

<!-- WhatsApp button -->
<a href="https://wa.me/46739290743" class="whatsapp" target="_blank">
  💬 WhatsApp
</a>

<!-- Call button -->
<a href="tel:+46739290743" class="call">
  📞 Call Now
</a>

</body>
</html>
