<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CleanDrive Sweden</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
  text-align: center;
}

header {
  background: #0056b3;
  color: white;
  padding: 40px;
}

.section {
  background: white;
  margin: 20px;
  padding: 20px;
  border-radius: 10px;
}

input {
  width: 80%;
  padding: 10px;
  margin: 10px;
}

button {
  padding: 10px 20px;
  background: #007BFF;
  color: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #0056b3;
}

.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px;
  border-radius: 50px;
  text-decoration: none;
}
</style>

</head>

<body>

<header>
  <h1>🚗 CleanDrive Sweden</h1>
  <p>Professionell mobil biltvätt</p>
</header>

<div class="section">
  <h2>📅 Boka nu</h2>

  <form id="bookingForm">
    <input type="text" id="name" placeholder="Ditt namn" required><br>
    <input type="datetime-local" id="time" required><br>
    <button type="submit">Boka nu</button>
  </form>
</div>

<a href="https://wa.me/46739290743" class="whatsapp" target="_blank">
  💬 WhatsApp
</a>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT_ID",
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// booking system
document.getElementById("bookingForm").addEventListener("submit", async function(e) {
  e.preventDefault();

  let name = document.getElementById("name").value;
  let time = document.getElementById("time").value;

  const q = query(collection(db, "bookings"), where("time", "==", time));
  const snapshot = await getDocs(q);

  if (!snapshot.empty) {
    alert("❌ Denna tid är redan bokad!");
  } else {
    await addDoc(collection(db, "bookings"), {
      name: name,
      time: time
    });

    alert("✅ Bokning lyckades!");
  }
});
</script>

</body>
</html>
